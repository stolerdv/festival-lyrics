document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ange: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9f0451e7-6107-43d2-9375-6075728ad4d1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Symbols Outlined';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2b828f0e-5bcf-4c0c-837e-707cadbaab63\") format('woff');\n}\n\n.material-symbols-outlined {\n  font-family: 'Material Symbols Outlined';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<script src=\"b1d483d9-5f9f-40c6-8d70-2b79d9d02173\"><\u002Fscript>\n<style>\n  :root {\n    --bg: #f3efe8;\n    --bg-deep: #ece7dd;\n    --paper: #ffffff;\n    --ink: #0b1220;\n    --ink-2: #1a2638;\n    --ink-soft: #3a4256;\n    --muted: #6b7280;\n    --line: rgba(11,18,32,.08);\n    --line-strong: rgba(11,18,32,.16);\n    --brand: #0046ff;\n    --brand-2: #0036c4;\n    --brand-soft: #e8eeff;\n    --brand-ink: #001a6b;\n    --warm: #f4dba0;\n    --warm-2: #ebcb7a;\n  }\n  *, *::before, *::after { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: 'Manrope', system-ui, sans-serif;\n    background: var(--bg);\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  .material-symbols-outlined { font-variation-settings: 'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24; }\n  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 28px; }\n  @media (max-width: 760px) { .wrap { padding: 0 18px; } }\n\n  /* ── NAV ── */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    background: #fff; border-bottom: 1px solid var(--line);\n  }\n  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; gap: 20px; }\n  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }\n  .logo-mark {\n    width: 38px; height: 38px; border-radius: 10px;\n    background: var(--brand); color: #fff;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .logo-text .lt-1 { font-weight: 800; font-size: 16px; letter-spacing: -.02em; color: var(--ink); display: block; }\n  .logo-text .lt-2 { font-weight: 600; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; display: block; }\n  .nav-pill {\n    display: flex; align-items: center; gap: 8px;\n    background: var(--brand-soft); color: var(--brand-ink);\n    padding: 7px 14px; border-radius: 999px;\n    font-size: 12.5px; font-weight: 700;\n  }\n  .nav-pill .material-symbols-outlined { font-size: 15px; }\n  .btn-nav {\n    background: var(--brand); color: #fff;\n    padding: 11px 20px; border-radius: 10px;\n    font-weight: 700; font-size: 14px; border: 0; cursor: pointer;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: background .15s; font-family: inherit; text-decoration: none;\n  }\n  .btn-nav:hover { background: var(--brand-2); }\n  @media (max-width: 640px) { .nav-pill { display: none; } }\n\n  /* ── SHARED ATOMS ── */\n  @keyframes pulse {\n    0%   { box-shadow: 0 0 0 0 rgba(0,70,255,.6); }\n    70%  { box-shadow: 0 0 0 8px rgba(0,70,255,0); }\n    100% { box-shadow: 0 0 0 0 rgba(0,70,255,0); }\n  }\n  .pulse-dot {\n    width: 8px; height: 8px; background: var(--brand); border-radius: 50%;\n    animation: pulse 1.8s infinite;\n  }\n  .pulse-mini {\n    width: 7px; height: 7px; background: var(--brand); border-radius: 50%;\n    animation: pulse 1.8s infinite;\n  }\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: var(--brand-soft); color: var(--brand-ink);\n    padding: 7px 14px; border-radius: 999px;\n    font-size: 12px; font-weight: 700; letter-spacing: .04em;\n    width: fit-content;\n  }\n  .sect-eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: var(--brand-soft); color: var(--brand-ink);\n    padding: 6px 12px; border-radius: 999px;\n    font-size: 11.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;\n    margin-bottom: 18px;\n  }\n  .cta-big {\n    background: var(--brand); color: #fff;\n    border: 0; padding: 18px 28px; border-radius: 12px;\n    font-weight: 800; font-size: 16px; letter-spacing: -.005em;\n    display: inline-flex; align-items: center; gap: 12px;\n    cursor: pointer; transition: background .15s;\n    font-family: inherit; text-decoration: none; width: fit-content;\n  }\n  .cta-big:hover { background: var(--brand-2); }\n  .cta-big .material-symbols-outlined { font-size: 20px; }\n\n  /* ══════════════════════════════════════════\n     BIG WHITE CARD  (hero + why as one unit)\n  ══════════════════════════════════════════ */\n  .landing { padding: 32px 0 0; }\n\n  /* Top part: hero grid */\n  .hero-part {\n    background: var(--paper);\n    border: 1px solid var(--line);\n    border-bottom: 0;\n    border-radius: 28px 28px 0 0;\n    padding: 44px 44px 56px;\n    display: grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 48px;\n  }\n  @media (max-width: 1020px) { .hero-part { grid-template-columns: 1fr; padding: 28px 28px 40px; border-radius: 24px 24px 0 0; gap: 36px; } }\n\n  .hero-left { display: flex; flex-direction: column; }\n  h1.hero-title {\n    margin: 24px 0 20px;\n    font-size: clamp(36px, 4.8vw, 66px);\n    font-weight: 800; letter-spacing: -.035em; line-height: 1;\n    color: var(--ink);\n  }\n  .hero-title em { font-style: normal; color: var(--brand); }\n  .hero-title .hl {\n    display: inline-block;\n    background: linear-gradient(180deg, transparent 64%, var(--warm) 64%, var(--warm) 92%, transparent 92%);\n    padding: 0 3px;\n  }\n  .hero-sub { font-size: 16.5px; line-height: 1.6; color: var(--ink-soft); margin: 0 0 32px; max-width: 520px; }\n  .hero-meta { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }\n  .meta-row { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; font-weight: 600; color: var(--ink); }\n  .meta-row .material-symbols-outlined { font-size: 19px; color: var(--brand); flex: none; margin-top: 1px; }\n  .meta-detail { display: flex; flex-direction: column; gap: 2px; }\n  .meta-detail span { font-size: 13px; font-weight: 500; color: var(--muted); }\n\n  /* Bottom part: why section */\n  .why-part {\n    background: var(--ink);\n    border: 1px solid var(--line);\n    border-top: 0;\n    border-radius: 0 0 28px 28px;\n    padding: 48px 44px 52px;\n    position: relative;\n    overflow: hidden;\n  }\n  @media (max-width: 1020px) { .why-part { padding: 32px 28px 40px; border-radius: 0 0 24px 24px; } }\n  .why-part::before {\n    content: '';\n    position: absolute; top: -200px; right: -100px;\n    width: 500px; height: 500px;\n    background: radial-gradient(circle, rgba(0,70,255,.2), transparent 60%);\n    pointer-events: none;\n  }\n  .why-part-head {\n    margin-bottom: 28px;\n    position: relative; z-index: 1;\n  }\n  .why-part-head h2 {\n    margin: 0;\n    font-size: clamp(24px, 2.8vw, 38px);\n    font-weight: 800; letter-spacing: -.03em; line-height: 1.1;\n    color: #fff;\n  }\n  .why-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px;\n    position: relative; z-index: 1;\n  }\n  @media (max-width: 1100px) { .why-grid { grid-template-columns: repeat(2, 1fr); } }\n  @media (max-width: 640px)  { .why-grid { grid-template-columns: 1fr; } }\n  .why-card {\n    background: rgba(255,255,255,.05);\n    border: 1px solid rgba(255,255,255,.1);\n    border-radius: 18px;\n    padding: 24px 22px;\n    display: flex; flex-direction: column; gap: 12px;\n    transition: background .2s;\n  }\n  .why-card:hover { background: rgba(255,255,255,.09); }\n  .why-ico {\n    width: 46px; height: 46px; border-radius: 12px;\n    background: rgba(255,255,255,.08);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--warm-2); flex: none;\n  }\n  .why-ico .material-symbols-outlined { font-size: 24px; }\n  .why-card h3 { margin: 0; font-size: 15px; font-weight: 800; letter-spacing: -.01em; color: #fff; line-height: 1.3; }\n  .why-card p  { margin: 0; font-size: 13.5px; line-height: 1.6; color: rgba(255,255,255,.6); }\n\n  /* ── SLIDER ── */\n  .hero-right { position: relative; align-self: stretch; min-height: 480px; }\n  .slider {\n    position: relative; width: 100%; height: 100%;\n    border-radius: 20px; overflow: hidden;\n    background: var(--ink-2);\n  }\n  .slide { position: absolute; inset: 0; opacity: 0; transition: opacity .55s ease; }\n  .slide.active { opacity: 1; }\n  .slide image-slot {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%; display: block;\n    border-radius: 0 !important;\n  }\n  .slide-shade {\n    position: absolute; inset: 0;\n    background: linear-gradient(180deg, rgba(11,18,32,.05) 20%, rgba(11,18,32,.88) 100%);\n    pointer-events: none; z-index: 1;\n  }\n  .slide-body {\n    position: absolute; bottom: 0; left: 0; right: 0;\n    padding: 28px 28px 40px; color: #fff; z-index: 2;\n  }\n  .slide-tag {\n    display: inline-flex; align-items: center; gap: 7px;\n    background: rgba(255,255,255,.12); backdrop-filter: blur(8px);\n    border: 1px solid rgba(255,255,255,.2);\n    color: #fff; padding: 5px 12px; border-radius: 999px;\n    font-size: 11.5px; font-weight: 700; letter-spacing: .04em; margin-bottom: 12px;\n  }\n  .slide-tag .dot { width: 6px; height: 6px; background: var(--warm-2); border-radius: 50%; flex: none; }\n  .slide h3 { margin: 0 0 6px; font-size: 20px; font-weight: 700; letter-spacing: -.01em; line-height: 1.25; }\n  .slide-meta { font-size: 13px; color: rgba(255,255,255,.75); }\n  .slider-dots {\n    position: absolute; top: 22px; right: 22px;\n    display: flex; gap: 8px; z-index: 5;\n  }\n  .sdot {\n    width: 44px; height: 5px; border-radius: 3px;\n    background: rgba(255,255,255,.3); border: 0; padding: 8px 0;\n    background-clip: content-box; cursor: pointer;\n    transition: background .2s; box-sizing: content-box;\n  }\n  .sdot.active { background: rgba(255,255,255,1); }\n  @media (max-width: 1020px) { .hero-right { min-height: 300px; } }\n\n  /* ══════════════════════════════════════════\n     SCHEDULE SECTION\n  ══════════════════════════════════════════ */\n  .section { padding: 72px 0 0; background: var(--bg); }\n  .sect-head { margin-bottom: 36px; }\n  .sect-head h2 {\n    margin: 0 0 12px;\n    font-size: clamp(28px, 3.4vw, 46px);\n    font-weight: 800; letter-spacing: -.035em; line-height: 1.04;\n    color: var(--ink);\n  }\n  .sect-lead { font-size: 16.5px; line-height: 1.6; color: var(--ink-soft); margin: 0; max-width: 620px; }\n\n  .schedule-wrap {\n    background: var(--paper);\n    border: 1px solid var(--line);\n    border-radius: 24px; overflow: hidden;\n  }\n  .day-tabs {\n    display: grid; grid-template-columns: 1fr 1fr;\n    background: var(--bg-deep); border-bottom: 1px solid var(--line);\n  }\n  .day-tab {\n    padding: 18px 28px; background: transparent; border: 0;\n    font-family: inherit; cursor: pointer;\n    display: flex; flex-direction: column; align-items: flex-start; gap: 3px;\n    border-bottom: 3px solid transparent; text-align: left; transition: all .2s;\n  }\n  .day-tab .tab-label { font-weight: 800; font-size: 14.5px; color: var(--muted); }\n border: 1px solid var(--line); border-radius: 12px; padding: 11px 14px; }\n  .zone-label {\n    display: flex; align-items: center; gap: 6px;\n    font-size: 10.5px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;\n    color: var(--brand); margin-bottom: 4px;\n  }\n  .zone-label .material-symbols-outlined { font-size: 13px; }\n  .zone p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--ink-soft); }\n  @media (max-width: 500px) { .tl-item { grid-template-columns: 72px 1fr; gap: 0 14px; } .tl-time { font-size: 10px; } }\n\n  /* ══════════════════════════════════════════\n     REGISTRATION FORM SECTION\n  ══════════════════════════════════════════ */\n  .reg-section { padding: 64px 0 0; background: var(--bg); }\n  .reg-card {\n    background: var(--ink); color: #fff;\n    border-radius: 28px 28px 0 0;\n    display: grid; grid-template-columns: 1fr 1fr;\n    overflow: hidden;\n    position: relative;\n  }\n  @media (max-width: 960px) { .reg-card { grid-template-columns: 1fr; } }\n  .reg-card::before {\n    content: '';\n    position: absolute; top: -200px; left: -120px;\n    width: 560px; height: 560px;\n    background: radial-gradient(circle, rgba(0,70,255,.25), transparent 60%);\n    pointer-events: none;\n  }\n\n  /* Left: text */\n  .reg-left {\n    padding: 64px 56px 72px;\n    display: flex; flex-direction: column;\n    position: relative; z-index: 1;\n  }\n  @media (max-width: 960px) { .reg-left { padding: 48px 32px 32px; } }\n  .reg-eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14);\n    color: rgba(255,255,255,.85);\n    padding: 6px 14px; border-radius: 999px;\n    font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;\n    margin-bottom: 28px; width: fit-content;\n  }\n  .reg-eyebrow .material-symbols-outlined { font-size: 14px; color: var(--warm-2); }\n  .reg-left h2 {\n    margin: 0 0 18px;\n ">\n              <h4>Сбор гостей<\u002Fh4>\n              <p>Последние репетиции, сбор участников. На территории собора начинают работу фуд-корты с кофе, крафтовым чаем и вкусностями.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">19:00<br>19:30<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Торжественное открытие<\u002Fh4>\n              <p>Старт фестиваля! Знакомство с ведущими, ввод в программу и первое появление гостей на сцене.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">19:30<br>20:30<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Время для всей семьи<\u002Fh4>\n              <p>Параллельные зоны активности:<\u002Fp>\n              <div class=\"zones\">\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">mic<\u002Fspan> Главная сцена<\u002Fdiv>\n                  <p>Интерактивная программа. Конкурсы, разговор о семейных ценностях и роли современного мужчины.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">child_friendly<\u002Fspan> Детская зона<\u002Fdiv>\n                  <p>Аниматоры, эстафеты, творческие мастер-классы и первый разлив бесплатной сладкой ваты.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">church<\u002Fspan> Экскурсия · группа 1<\u002Fdiv>\n                  <p>Первая группа отправляется внутрь Кафедрального собора — история здания изнутри.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">20:30<br>21:30<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Вечерняя программа и живая музыка<\u002Fh4>\n              <p>Зажигательный финал первого дня. Живой звук и максимум хорошего настроения под первыми летними звёздами.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- СУББОТА -->\n      <div class=\"schedule-pane\" id=\"pane-sat\">\n        <div class=\"tl\">\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">17:30<br>18:00<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Сбор гостей<\u002Fh4>\n              <p>Открываются все локации: фуд-корт, детские зоны, фотозоны. Время занять лучшие места.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">18:00<br>19:00<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Шедевры под сводами: Органный концерт<\u002Fh4>\n              <p>Перемещаемся внутрь собора. Монументальное звучание органа и шедевры классики в потрясающей акустике храма. Такое событие бывает раз в году!<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">19:00<br>20:30<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Время для всей семьи<\u002Fh4>\n              <p>Параллельные зоны:<\u002Fp>\n              <div class=\"zones\">\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">mic<\u002Fspan> Главная сцена<\u002Fdiv>\n                  <p>Конкурсы, розыгрыши призов, уютное общение и душевные разговоры о самом важном.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">church<\u002Fspan> Экскурсия · группа 2<\u002Fdiv>\n                  <p>Вторая волна экскурсий по собору для тех, кто не успел в пятницу.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"zone\">\n                  <div class=\"zone-label\"><span class=\"material-symbols-outlined\">child_friendly<\u002Fspan> Детская зона<\u002Fdiv>\n                  <p>Новая программа — увлекательный квест и весёлые игры с аниматорами.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-item\">\n            <div class=\"tl-time\">20:30<br>21:30<\u002Fdiv>\n            <div class=\"tl-line\">\n              <h4>Гала-концерт и финальный аккорд<\u002Fh4>\n              <p>Живой звук, вдохновляющие истории и максимум хорошего настроения для каждого под летними звёздами.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv><!-- /schedule-wrap -->\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ ФОРМА РЕГИСТРАЦИИ ══════════ -->\n<section class=\"reg-section\" id=\"register\">\n  <div class=\"wrap\">\n    <div class=\"reg-card\">\n\n      <!-- Левый блок: текст -->\n      <div class=\"reg-left\">\n        <div class=\"reg-eyebrow\">\n          <span class=\"material-symbols-outlined\">confirmation_number<\u002Fspan>\n          Количество мест ограничено\n        <\u002Fdiv>\n        <h2>Проведите эти летние выходные с пользой<\u002Fh2>\n        <p>Забронируйте участие заранее, чтобы мы подготовили всё необходимое для вас и ваших детей. Места на экскурсию внутри собора и сидячие места на концерт ограничены.<\u002Fp>\n        <div class=\"reg-trust\">\n          <div class=\"trust-row\">\n            <span class=\"material-symbols-outlined\">calendar_month<\u002Fspan>\n            26–27 июня 2026, Кафедральный собор\n          <\u002Fdiv>\n          <div class=\"trust-row\">\n            <span class=\"material-symbols-outlined\">groups<\u002Fspan>\n            Для всей семьи · вход свободный\n          <\u002Fdiv>\n          <div class=\"trust-row\">\n            <span class=\"material-symbols-outlined\">music_note<\u002Fspan>\n            Живая музыка · органный концерт · детская зона\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Правый блок: форма -->\n      <div class=\"reg-right\">\n        <div id=\"regForm\">\n          <div class=\"reg-form-head\">\n            <h3>Занять место<\u002Fh3>\n            <p>Мы свяжемся с вами и подтвердим участие<\u002Fp>\n          <\u002Fdiv>\n          <form id=\"festForm\" onsubmit=\"handleSubmit(event)\">\n            <div class=\"field\">\n              <label>Ваше имя<\u002Flabel>\n              <input type=\"text\" name=\"name\" placeholder=\"Алексей\" required=\"\">\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label>Электронная почта<\u002Flabel>\n              <input type=\"email\" name=\"email\" placeholder=\"hello@example.com\" required=\"\">\n            <\u002Fdiv>\n            <button class=\"reg-submit\" type=\"submit\">\n              <span class=\"material-symbols-outlined\">send<\u002Fspan>\n              Занять место на фестивале\n            <\u002Fbutton>\n            <p class=\"reg-hint\">Без спама — только подтверждение и детали мероприятия<\u002Fp>\n          <\u002Fform>\n        <\u002Fdiv>\n        <div class=\"reg-success\" id=\"regSuccess\">\n          <div class=\"success-ico\">\n            <span class=\"material-symbols-outlined\">check_circle<\u002Fspan>\n          <\u002Fdiv>\n          <h4>Место забронировано!<\u002Fh4>\n          <p>Мы написали вам на почту.<br>Ждём вас 26–27 июня у Кафедрального собора.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ FOOTER ══════════ -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer-inner\">\n      <div class=\"footer-left\">\n        <b>Летний фестиваль · Кафедральный собор<\u002Fb>\n        <span>Караганда · 26–27 июня 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"footer-right\">© 2026 Все права защищены<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  /* ── Slider ── */\n  const slides = document.querySelectorAll('.slide');\n  const dots   = document.querySelectorAll('.sdot');\n  let cur = 0;\n  function goTo(i) {\n    cur = (i + slides.length) % slides.length;\n    slides.forEach((s, n) => s.classList.toggle('active', n === cur));\n    dots.forEach((d, n) => d.classList.toggle('active', n === cur));\n  }\n  dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));\n  let auto = setInterval(() => goTo(cur + 1), 6000);\n  const sl = document.getElementById('slider');\n  sl.addEventListener('mouseenter', () => clearInterval(auto));\n  sl.addEventListener('mouseleave', () => { clearInterval(auto); auto = setInterval(() => goTo(cur + 1), 6000); });\n  let touchX = null;\n  sl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });\n  sl.addEventListener('touchend', e => {\n    if (touchX === null) return;\n    const dx = e.changedTouches[0].clientX - touchX;\n    if (Math.abs(dx) > 40) goTo(cur + (dx < 0 ? 1 : -1));\n    touchX = null;\n  });\n\n  /* ── Schedule tabs ── */\n  const days = ['fri', 'sat'];\n  function switchDay(day) {\n    document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));\n    document.querySelectorAll('.schedule-pane').forEach(p => p.classList.remove('active'));\n    document.getElementById('pane-' + day).classList.add('active');\n  }\n  document.querySelectorAll('.day-tab').forEach(tab => {\n    tab.addEventListener('click', () => switchDay(tab.dataset.day));\n  });\n\n  /* Swipe on schedule block */\n  const scheduleWrap = document.querySelector('.schedule-wrap');\n  let swipeStartX = null;\n  scheduleWrap.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; }, { passive: true });\n  scheduleWrap.addEventListener('touchend', e => {\n    if (swipeStartX === null) return;\n    const dx = e.changedTouches[0].clientX - swipeStartX;\n    if (Math.abs(dx) > 44) {\n      const activeTab = document.querySelector('.day-tab.active');\n      const curIdx = days.indexOf(activeTab.dataset.day);\n      const nextIdx = (curIdx + (dx < 0 ? 1 : -1) + days.length) % days.length;\n      switchDay(days[nextIdx]);\n    }\n    swipeStartX = null;\n  });\n\n  /* ── Form submit ── */\n  function handleSubmit(e) {\n    e.preventDefault();\n    document.getElementById('regForm').style.display = 'none';\n    document.getElementById('regSuccess').style.display = 'block';\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
